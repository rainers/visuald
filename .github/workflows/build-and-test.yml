name: build visuald

on: [push, pull_request]

env:
  # Path to the solution file relative to the root of the project.
  SOLUTION_FILE_PATH: src/visuald_vs10.vcxproj

  # Configuration type to build.
  BUILD_CONFIGURATION: Release
  BUILD_PLATFORM: x64
  BUILD_PLATFORM_TOOLSET: v142
  DMD_VER: 2.111.0
  VISUALD_VER: 1.4.1

jobs:
  build:
    # windows-latest doesn't have .net framework 4.0
    runs-on: windows-2022

    steps:
      - name: Checkout visuald
        uses: actions/checkout@v3
        with:
          path: visuald/trunk
          submodules: recursive
#      - name: Checkout cv2pdb
#        uses: actions/checkout@v3
#        with:
#          repository: rainers/cv2pdb
#          path: cv2pdb/trunk
#      - name: Checkout mago
#        uses: actions/checkout@v3
#        with:
#          repository: rainers/mago
#          path: mago
      - name: Prepare D compiler
        uses: dlang-community/setup-dlang@v1
        with:
          compiler: dmd-${{ env.DMD_VER }}
      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v1.0.2
      - name: Setup VS environment
        uses: seanmiddleditch/gha-setup-vsdevenv@v4
      - name: Download Visual D
        uses: supplypike/setup-bin@v1
        with:
          uri: 'https://github.com/dlang/visuald/releases/download/v${{ env.VISUALD_VER }}/VisualD-v${{ env.VISUALD_VER }}.exe'
          name: 'VisualD-v${{ env.VISUALD_VER }}.exe'
          version: '${{ env.VISUALD_VER }}'
          command: ./VisualD-v${{ env.VISUALD_VER }}.exe /S
      - name: Register visuald
        run: |
          reg add "HKLM\SOFTWARE\DMD" /v "InstallationDir" /t REG_SZ /d "c:\hostedtoolcache\windows\dc\dmd-$DMD_VER\x64" /reg:32 /f
          reg add "HKLM\SOFTWARE\VisualD" /v "DMDInstallDir" /t REG_SZ /d "c:\hostedtoolcache\windows\dc\dmd-$DMD_VER\x64\dmd2" /reg:32 /f
      - name: Build visuald
        working-directory: visuald/trunk
        run: nmake d_modules dmdserver_test
      - name: Upload binaries
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: bin
          path: visuald/trunk/bin
